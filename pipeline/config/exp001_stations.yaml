      EXP001 pre-run plan recorded lat=42.6106, lon=-123.3692, elev=1175m.
      IEM authoritative values: lat=42.6003, lon=-123.3642, elev=1171m.
      Independent cross-check (AOPA, weather.gov, iflightplanner.com) confirms:
