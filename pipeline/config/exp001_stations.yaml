      IEM values used as authoritative for station freeze.
      Latitude delta of 0.0103 deg is a CAUTION but does not block pipeline;
      the change affects HRRR nearest-grid-point selection and must be noted
      in the provenance manifest. At HRRR 3-km resolution, 0.010 deg ~1.1 km
      — may shift the selected grid cell. HRRR grid-to-station elevation mismatch
      must be computed and reviewed before any SUPPORTED_PATTERN claim.
    hrrr_elevation_mismatch_flag: true
    hrrr_elevation_mismatch_note: >
      SXT is at 1171m on a mountain pass. HRRR 3-km terrain smoothing typically
      underrepresents sharp pass elevations. Absolute elevation mismatch between
      HRRR grid terrain height and 1171m station elevation is expected to exceed
      50m, triggering the proxy-risk flag defined in EXP001 pre-run plan.
      Mismatch must be computed and logged in Phase 2E before any claim eligibility
      decision for the mountain_pass group.
    asos_completeness_check_required: true
    asos_completeness_note: >
      SXT is a non-airport mountain-pass ASOS. Observation volume and QC rates
      for summer 2024 are unconfirmed. Phase 2C must verify >=90% usable hourly
      observations over the full window before SXT is eligible for SUPPORTED_PATTERN
      claims. If completeness falls below 90%, SXT must be flagged and operator
      review is required before Stage 3.
    proxy_risk_notes: >
      High-risk station for multiple proxy-risk categories per EXP001 plan:
      (1) HRRR grid-to-station elevation mismatch >50m expected — flag required.
      (2) Mountain/pass representativeness: SXT at a highway pass may not represent
          broad Cascades terrain; must be documented in proxy-risk review.
      (3) SRTM void risk: steep terrain at 1171m — SRTM tile coverage at
          (42.6003, -123.3642) must be verified in Phase 2E; NED 3DEP as fallback.

